# .goreleaser.yaml
# Run: goreleaser release --clean
# Triggered automatically by .github/workflows/release.yml on git tag push.

project_name: ncr-on-terminal

before:
  hooks:
    - go mod tidy

builds:
  # ── Local TUI binary ────────────────────────────────────────────────────────
  - id: ncr-on-terminal
    binary: ncr-on-terminal
    main: ./
    env:
      - CGO_ENABLED=0   # modernc.org/sqlite is pure Go — no CGo needed
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64   # Windows ARM64 is niche; skip for now

  # ── SSH demo server binary ──────────────────────────────────────────────────
  - id: ncr-sshserver
    binary: ncr-sshserver
    main: ./cmd/sshserver
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: ncr-on-terminal
    builds: [ncr-on-terminal]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: ncr-sshserver
    builds: [ncr-sshserver]
    name_template: "ncr-sshserver_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: adot-7
    name: ncr-on-terminal
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  footer: |
    ---
    **Full Changelog**: https://github.com/adot-7/ncr-on-terminal/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
